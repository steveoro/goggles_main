version: 2.1
orbs:
  ruby: circleci/ruby@2.7.1
  browser-tools: circleci/browser-tools@2.4.2

ARTIFACTS_PATH: &ARTIFACTS_PATH ~/test-artifacts

common-config: &common-config
  resource_class: large
  working_directory: ~/goggles_main
  shell: /bin/bash --login
  # [20251012] NOTE: not using CodeClimate anymore because now it's not open/free anymore
  #            (CodeClimate has changed into an Enterprise solution only)
  docker:
  - image: cimg/ruby:3.4.7-browsers
    environment:
      RAILS_ENV: test
      NODE_ENV: test
      BUNDLE_JOBS: 2
      BUNDLE_RETRY: 2
      BUNDLE_PATH: vendor/bundle
      PAGER: cat
      GIT_LFS_SKIP_SMUDGE: 1
      AUTO_ARTIFACTS: 1
      ARTIFACTS_PATH: *ARTIFACTS_PATH
  - image: cimg/mariadb:11.8.6
    environment:
      DATABASE_NAME: goggles_test
      DATABASE_USER: root
      PAGER: cat

deploy-config: &deploy-config
  resource_class: large
  working_directory: ~/goggles_main
  shell: /bin/bash --login
  docker:
  - image: cimg/ruby:3.4.7-browsers
    environment:
      BUNDLE_JOBS: 2
      BUNDLE_RETRY: 2
      BUNDLE_PATH: vendor/bundle
      PAGER: cat
      GIT_LFS_SKIP_SMUDGE: 1
  - image: cimg/mariadb:11.8.6
    environment:
      DATABASE_NAME: goggles
      DATABASE_USER: root
      PAGER: cat

web-assets: &web-assets
  name: Assets precompile
  command: |
    echo "- RAILS_ENV...: $RAILS_ENV"
    bin/rails dartsass:build
    bin/rails assets:precompile

common-db-setup: &common-db-setup
  name: DB setup
  command: |
    sudo apt update
    sudo apt-get install mariadb-client
    mkdir -p tmp ~/test-results "$ARTIFACTS_PATH"
    echo $RAILS_MASTER_KEY > config/master.key
    cp ./tmp/test.sql.bz2 db/dump/test.sql.bz2
    mv config/database_ci.yml config/database.yml
    dockerize -wait tcp://localhost:3306 -timeout 2m
    echo "- RAILS_ENV...: $RAILS_ENV"
    bin/rails db:rebuild from=test
    bin/rails db:migrate

jobs:
  persisted-data:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - run:
        name: Setup persisted data
        command: |
          mkdir -p tmp
          curl -L -o ./tmp/test.sql.bz2 "https://github.com/steveoro/goggles_db/raw/master/spec/dummy/db/dump/test.sql.bz2"
    - persist_to_workspace:
        root: tmp
        paths:
        # - cc-test-reporter
        - test.sql.bz2

  rubocop:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - checkout
    - ruby/install-deps:
        app-dir: ~/goggles_main
        key: goggles_main-v0905
    - ruby/rubocop-check:
        app-dir: ~/goggles_main
        label: Rubocop
        format: pacman

  brakeman:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - checkout
    - ruby/install-deps:
        app-dir: ~/goggles_main
        key: goggles_main-v0905
    - run:
        name: Brakeman
        command: |
          bundle exec brakeman -A6q -c .brakeman.cfg

  zeitwerk:
    <<: *common-config
    # parallelism: 1 (no actual need here)
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_main/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_main
        key: goggles_main-v0905
    - run:
        <<: *common-db-setup
    - run:
        name: Zeitwerk check
        command: |
          bundle exec rake zeitwerk:check

  rspec-components:
    <<: *common-config
    parallelism: 2
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_main/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_main
        key: goggles_main-v0905
    - run:
        <<: *common-db-setup
    - run:
        name: RSpec - Components
        command: |
          TEST_FILES=$(circleci tests glob "spec/components/**/*_spec.rb")
          echo "$TEST_FILES" | circleci tests run --command="xargs bundle exec rspec --color --order rand -f doc \
                      --format RspecJunitFormatter -o ~/test-results/rspec-components.xml" --verbose --split-by=timings
    - store_test_results:
        path: ~/test-results

