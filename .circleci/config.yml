  docker-latest:
    <<: *deploy-config
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_main/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_main
        key: goggles_main-v0905
    - run:
        <<: *common-db-setup
        environment:
          RAILS_ENV: staging
          NODE_ENV: production
    - setup_remote_docker:
        version: default
        docker_layer_caching: true
    - run:
        <<: *web-assets
        environment:
          RAILS_ENV: staging
          NODE_ENV: production
    - run:
        name: Docker LATEST staging
        command: |
          BRANCH_NAME="${CIRCLE_BRANCH:-}"
          if [ -z "$BRANCH_NAME" ] && [ -n "${CIRCLE_SHA1:-}" ]; then
            BRANCH_NAME=$(git branch -r --contains "$CIRCLE_SHA1" | sed 's/^[ *]*//' | grep -v 'HEAD' | head -n1 | sed 's#^origin/##')
          fi
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          SEMANTIC_VERSION=$(ruby -I. -r./lib/version -e 'print Version::SEMANTIC')
          if [ -n "$SANITIZED_BRANCH" ] && [ "$SANITIZED_BRANCH" != "master" ]; then
            DOCKER_TAG="${SEMANTIC_VERSION}.${SANITIZED_BRANCH}"
          else
            DOCKER_TAG="latest"
          fi
          echo "Docker Tag: $DOCKER_TAG"
          echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
          docker pull $DOCKERHUB_USERNAME/goggles-main:latest
          export DOCKER_BUILDKIT=1
          docker build \
            --secret id=rails_master_key,env=RAILS_MASTER_KEY \
            -t $DOCKERHUB_USERNAME/goggles-main:$DOCKER_TAG \
            --cache-from=$DOCKERHUB_USERNAME/goggles-main:latest \
            -f Dockerfile.staging .
          docker push $DOCKERHUB_USERNAME/goggles-main:$DOCKER_TAG

  docker-versioned:
    <<: *deploy-config
    steps:
    - checkout
    - attach_workspace:
        at: ~/goggles_main/tmp
    - ruby/install-deps:
        app-dir: ~/goggles_main
        key: goggles_main-v0905
    - run:
        <<: *common-db-setup
        environment:
          RAILS_ENV: production
          NODE_ENV: production
    - setup_remote_docker:
        version: default
        docker_layer_caching: true
    - run:
        <<: *web-assets
        environment:
          RAILS_ENV: production
          NODE_ENV: production
    - run:
        name: Docker TAGGED prod
        command: |
          BRANCH_NAME="${CIRCLE_BRANCH:-}"
          if [ -z "$BRANCH_NAME" ] && [ -n "${CIRCLE_SHA1:-}" ]; then
            BRANCH_NAME=$(git branch -r --contains "$CIRCLE_SHA1" | sed 's/^[ *]*//' | grep -v 'HEAD' | head -n1 | sed 's#^origin/##')
          fi
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          SEMANTIC_VERSION=$(ruby -I. -r./lib/version -e 'print Version::SEMANTIC')
          if [ -n "$SANITIZED_BRANCH" ] && [ "$SANITIZED_BRANCH" != "master" ]; then
            DOCKER_TAG="${SEMANTIC_VERSION}.${SANITIZED_BRANCH}"
          else
            DOCKER_TAG="<< pipeline.git.tag >>"
          fi
          echo "Git Tag: << pipeline.git.tag >>, Docker Tag: $DOCKER_TAG"
          echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
          docker pull $DOCKERHUB_USERNAME/goggles-main:latest
          export DOCKER_BUILDKIT=1
          docker build \
            --secret id=rails_master_key,env=RAILS_MASTER_KEY \
            -t $DOCKERHUB_USERNAME/goggles-main:$DOCKER_TAG \
            --cache-from=$DOCKERHUB_USERNAME/goggles-main:latest \
            -f Dockerfile.prod .
          docker push $DOCKERHUB_USERNAME/goggles-main:$DOCKER_TAG

  # [Steve, 20260515] no more staging deployment
  # deploy-staging:
  #   <<: *deploy-config
  #   steps:
  #   - run:
  #       name: Staging DEPLOY
  #       command: |
  #         ssh -o StrictHostKeyChecking=no deploy@$SSH_SERVER "DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME DOCKERHUB_PASSWORD=$DOCKERHUB_PASSWORD bash -c ./deploy_staging.sh"

  deploy-production:
    <<: *deploy-config
    steps:
    - run:
        name: Production DEPLOY
        command: |
          echo "Git Tag << pipeline.git.tag >>"
          ssh -o StrictHostKeyChecking=no deploy@$SSH_SERVER "TAG=<< pipeline.git.tag >> MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD DOCKERHUB_USERNAME=$DOCKERHUB_USERNAME DOCKERHUB_PASSWORD=$DOCKERHUB_PASSWORD bash -c ./deploy_prod.sh"

workflows:
  build-and-deploy-versioned:
    jobs:
    - persisted-data:
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - brakeman:
        requires:
        - persisted-data
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - zeitwerk:
        requires:
        - persisted-data
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - docker-versioned:
        requires:
        - brakeman
        - zeitwerk
        filters:
          tags:
            only: /^\d+\.\d+.*/
          branches:
            ignore: /.*/
    - deploy-production:
