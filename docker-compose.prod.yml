services:
  goggles-db:
    image: mariadb:11.8.6
    # Set max_allowed_packet to 512M (this should prevent the "MySQL server has gone away"
    # issue due to timeout when running huge queries)
    command: --max_allowed_packet=67108864
    container_name: goggles-db
    env_file:
      - .env
    # Localhost only: use SSH tunnel for remote admin access (never publish on 0.0.0.0).
    ports:
      - '127.0.0.1:33060:3306'
    restart: always
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - "~/Projects/goggles_deploy/db.prod:/var/lib/mysql"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  api:
    # Since vers. 0.9+, we dropped the "prod-" prefix from the tag:
    image: "${DOCKERHUB_USERNAME:-steveoro}/goggles-api:${TAG:-latest}"
    depends_on:
      - goggles-db
    container_name: goggles-api
    env_file:
      - .env
    # Reachable only via reverse proxy on the host (or SSH tunnel).
    ports:
      - '127.0.0.1:8081:8081'
    restart: always
    # DAC_OVERRIDE: container runs as root but host bind mounts are owned by deploy (600 keys, storage).
    # Without it, cap_drop ALL makes even root hit EACCES on those paths.
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - "~/Projects/goggles_deploy/storage.prod:/app/storage"
      - "~/Projects/goggles_deploy/backups:/app/db/dump"
      - "~/Projects/goggles_deploy/log.prod/api:/app/log"
      - type: bind
        source: "~/Projects/goggles_deploy/master-api.key"
        target: /app/config/master.key
        read_only: true

  main:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: "${DOCKERHUB_USERNAME:-steveoro}/goggles-main:${TAG:-latest}"
    depends_on:
      - goggles-db
      - api
    container_name: goggles-main
    env_file:
      - .env
    # Reachable only via reverse proxy on the host (or SSH tunnel).
    ports:
      - '127.0.0.1:8080:8080'
    restart: always
    # Entrypoint still needs root for sSMTP rewriting; drop kernel capabilities instead.
    # DAC_OVERRIDE: see api service comment (master.key + storage.prod owned by deploy).
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    mem_limit: 1536m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    volumes:
      - "~/Projects/goggles_deploy/storage.prod:/app/storage"
      - "~/Projects/goggles_deploy/backups:/app/db/dump"
      - "~/Projects/goggles_deploy/log.prod:/app/log"
      - type: bind
        source: "~/Projects/goggles_deploy/master-main.key"
        target: /app/config/master.key
        read_only: true
      - type: bind
        source: "~/Projects/goggles_deploy/production.rb"
        target: /app/config/environments/production.rb
        read_only: true

volumes:
  gem_cache:
  node_modules:
